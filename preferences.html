<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      margin: 18px;
      color: -apple-system-label;
      font: 13px -apple-system, BlinkMacSystemFont, sans-serif;
    }
    h2 {
      margin: 0 0 8px;
      font-size: 18px;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 8px;
      color: -apple-system-secondary-label;
      line-height: 1.4;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
  </style>
</head>
<body>
  <h2>iinatan</h2>
  <p>Profiles, popup appearance, playback, language, lookup, dictionaries, and imports are managed from <code>Plugins -> iinatan -> Settings...</code>.</p>
  <script>
    try {
      if (typeof iina !== 'undefined' && iina.preferences && iina.preferences.sync) {
        iina.preferences.sync();
      }
    } catch (_) {}
  </script>
</body>
</html>
