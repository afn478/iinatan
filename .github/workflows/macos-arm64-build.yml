name: macOS Apple Silicon build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Package Apple Silicon plugin
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Confirm Apple Silicon runner
        run: |
          test "$(uname -m)" = "arm64"
          sw_vers
          xcodebuild -version

      - name: Ensure build tools
        run: |
          brew list cmake >/dev/null 2>&1 || brew install cmake

      - name: Generate plugin runtime files
        run: python3 scripts/build_plugin.py

      - name: Verify generated files are committed
        run: git diff --exit-code -- main.js overlay.html

      - name: Compile bundled lookup engine
        run: |
          bash scripts/build_native_backend.sh
          file bin/iina-hoshi-dicts

      - name: Package plugin
        run: python3 scripts/build_plugin.py --package dist/iinatan.iinaplgz

      - name: Upload plugin package
        uses: actions/upload-artifact@v4
        with:
          name: iinatan-plugin
          path: dist/iinatan.iinaplgz
